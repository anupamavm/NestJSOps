name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to ECR
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REPOSITORY_URL }}
      run: |
        docker build -t $$ ECR_REGISTRY: $${{ github.sha }} .
        docker push $$ ECR_REGISTRY: $${{ github.sha }}
        echo "image_uri=$$ ECR_REGISTRY: $${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'

    - name: Configure Kubeconfig
      run: aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name simple-eks-cluster

    - name: Deploy to Kubernetes
      env:
        IMAGE_TAG: ${{ github.sha }}
        RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
      run: |
        # Patch secret with RDS password (base64 for K8s)
        echo "apiVersion: v1
        kind: Secret
        metadata:
          name: simple-backend-db-secret
          namespace: simple-app
        type: Opaque
        stringData:
          DB_HOST: $(terraform output -raw rds_endpoint)  # Assumes tf outputs available; or use env var
          DB_PORT: '5432'
          DB_USERNAME: 'admin'
          DB_PASSWORD: $RDS_PASSWORD
          DB_NAME: 'postgres'" > k8s/secret-db-patched.yaml

        # Use kustomize to patch image tag
        cd k8s
        kustomize edit set image 123456789012.dkr.ecr.us-west-2.amazonaws.com/simple-backend=$ECR_REGISTRY:$IMAGE_TAG  # Replace with your ECR

        # Apply
        kubectl apply -k . --namespace simple-app